<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Perfil</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="site-shell profile-shell">
    <section class="card profile-card">

      <header class="panel-header simple">
        <div>
          <p class="eyebrow">Perfil</p>
          <h1>Datos de acceso</h1>
        </div>
        <div class="header-actions">
          <button id="goToOrder"  class="mini-button accent-button" type="button">+ Nuevo pedido</button>
          <button id="backToPanel" class="mini-button" type="button">Volver</button>
        </div>
      </header>

      <section class="profile-grid">

        <!-- Tarjeta de identidad -->
        <div class="identity-card">
          <img src="assets/isologo.jpeg" alt="" class="profile-logo" />
          <div class="identity-info">
            <p class="eyebrow">Cliente</p>
            <h2 id="profileStudio">Estudio</h2>
          </div>
        </div>

        <!-- Datos de contacto -->
        <div class="profile-data-block">
          <h3 class="block-label">Contacto</h3>
          <div class="data-row">
            <span>Correo</span>
            <strong id="profileEmail">correo@estudio.com</strong>
          </div>
          <div class="data-row">
            <span>Teléfono</span>
            <strong id="profilePhone">—</strong>
          </div>
        </div>

        <!-- Resumen de actividad -->
        <div class="activity-block">
          <h3 class="block-label">Actividad</h3>
          <div class="stats-grid">
            <div class="stat-item">
              <span class="stat-value" id="statTotal">—</span>
              <span class="stat-label">Pedidos totales</span>
            </div>
            <div class="stat-item">
              <span class="stat-value" id="statMedida">—</span>
              <span class="stat-label">Medida más usada</span>
            </div>
            <div class="stat-item">
              <span class="stat-value" id="statMes">—</span>
              <span class="stat-label">Este mes</span>
            </div>
          </div>
        </div>

        <!-- Último pedido -->
        <div class="last-order-block">
          <h3 class="block-label">Último pedido</h3>
          <div id="lastOrderContent" class="last-order-inner">
            <span class="profile-empty">Sin pedidos registrados.</span>
          </div>
        </div>

      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
