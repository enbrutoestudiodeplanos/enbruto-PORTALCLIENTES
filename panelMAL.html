<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Panel — En Bruto</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500&family=Barlow:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="site-shell">
    <section class="card dashboard-card">

      <header class="panel-header">
        <div>
          <p class="eyebrow">Cliente</p>
          <h1 id="panelStudio">Estudio</h1>
          <p class="lead compact" id="panelEmail">correo@estudio.com</p>
        </div>
        <div class="header-actions">
          <button id="profileButton" class="mini-button" type="button"><span>Perfil</span></button>
          <button id="logoutButton" class="mini-button" type="button"><span>Salir</span></button>
        </div>
      </header>

      <div class="dashboard-grid">

        <!-- Archivos -->
        <article class="info-block">
          <div class="block-head">
            <h2>Archivos disponibles</h2>
          </div>
          <div id="sharedFiles" class="file-list"></div>
        </article>

        <!-- Solicitar impresión -->
        <article class="info-block">
          <div class="block-head">
            <h2>Solicitar impresión</h2>
          </div>
          <form id="orderForm" class="stack-form compact-form" novalidate>

            <div class="grid-two">
              <div>
                <div class="field">
                  <label for="orderStudy">Cliente / estudio</label>
                  <input id="orderStudy" name="study" type="text" readonly />
                </div>
              </div>
              <div>
                <div class="field">
                  <label for="orderCode">Obra / código</label>
                  <input id="orderCode" name="code" type="text" placeholder="Ej. Casa Pérez" required />
                </div>
              </div>
            </div>

            <div class="grid-three">
              <div>
                <div class="field">
                  <label for="orderSize">Medida</label>
                  <select id="orderSize" name="size" required>
                    <option value="A0">A0</option>
                    <option value="A1">A1</option>
                    <option value="A2">A2</option>
                    <option value="A3">A3</option>
                    <option value="A4">A4</option>
                  </select>
                </div>
              </div>
              <div>
                <div class="field">
                  <label for="orderType">Impresión</label>
                  <select id="orderType" name="type" required>
                    <option value="Color">Color</option>
                    <option value="Blanco y negro">B&amp;N</option>
                  </select>
                </div>
              </div>
              <div>
                <div class="field">
                  <label for="orderQty">Cantidad</label>
                  <input id="orderQty" name="quantity" type="number" min="1" step="1" value="1" required />
                </div>
              </div>
            </div>

            <div class="field">
              <label for="orderNotes">Notas</label>
              <textarea id="orderNotes" name="notes" rows="3" placeholder="Indicaciones adicionales."></textarea>
            </div>

            <div class="field">
              <label for="orderFile">Archivo PDF</label>
              <input id="orderFile" name="file" type="file" accept="application/pdf" required />
            </div>

            <p class="helper">Solo PDF a escala correcta. Máx. 20 MB.</p>

            <button class="primary-button" type="submit">
              <span>Solicitar impresión</span>
              <svg viewBox="0 0 11 11" fill="none" aria-hidden="true" style="width:11px;height:11px;position:relative;z-index:1">
                <path d="M1 10L10 1M10 1H3M10 1V8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <p id="orderMessage" class="status-message" aria-live="polite"></p>

          </form>
        </article>

        <!-- Historial -->
        <article class="info-block full-span">
          <div class="block-head">
            <h2>Historial reciente</h2>
          </div>
          <div id="orderHistory" class="history-list"></div>
        </article>

      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
