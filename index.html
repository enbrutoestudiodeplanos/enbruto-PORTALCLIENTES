<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>En Bruto</title>
  <meta name="description" content="Portal privado para clientes autorizados." />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500&family=Barlow:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="site-shell">
    <section class="card split-card">

      <!-- LEFT -->
      <div class="left-panel">

        <nav class="tabs" role="tablist" aria-label="Navegación">
          <button class="tab is-active" role="tab" aria-selected="true" data-view="login" type="button">Acceder</button>
          <button class="tab" role="tab" aria-selected="false" data-view="request" type="button">Solicitar acceso</button>
        </nav>

        <!-- Login -->
        <section class="view is-active" data-content="login" role="tabpanel">
          <div class="view-head">
            <p class="view-tag">Acceso clientes</p>
            <h1>Acceder<span class="accent">al portal.</span></h1>
            <p class="lead">Portal privado para estudios autorizados.</p>
          </div>
          <form id="loginForm" class="stack-form" novalidate>
            <div class="field">
              <label for="loginEmail">Correo electrónico</label>
              <input id="loginEmail" name="email" type="email" placeholder="contacto@estudio.com" autocomplete="email" required />
            </div>
            <button class="primary-button" type="submit">
              <span>Ingresar</span>
              <svg viewBox="0 0 11 11" fill="none" aria-hidden="true" style="width:11px;height:11px;position:relative;z-index:1;transition:transform 200ms">
                <path d="M1 10L10 1M10 1H3M10 1V8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <p id="loginMessage" class="status-message" aria-live="polite"></p>
          </form>
        </section>

        <!-- Solicitar -->
        <section class="view" data-content="request" role="tabpanel">
          <div class="view-head">
            <p class="view-tag">Habilitación</p>
            <h1>Solicitar<span class="accent">acceso.</span></h1>
            <p class="lead">Completá el formulario y te contactamos en 24 h.</p>
          </div>
          <form id="requestForm" class="stack-form" novalidate>
            <div class="field">
              <label for="studioName">Nombre del estudio</label>
              <input id="studioName" name="studio" type="text" placeholder="Estudio ejemplo" required />
            </div>
            <div class="field">
              <label for="requestEmail">Correo</label>
              <input id="requestEmail" name="email" type="email" placeholder="contacto@estudio.com" autocomplete="email" required />
            </div>
            <div class="field">
              <label for="requestPhone">Teléfono</label>
              <input id="requestPhone" name="phone" type="tel" placeholder="11 2345-6789" autocomplete="tel" required />
            </div>
            <button class="primary-button" type="submit">
              <span>Enviar solicitud</span>
              <svg viewBox="0 0 11 11" fill="none" aria-hidden="true" style="width:11px;height:11px;position:relative;z-index:1;transition:transform 200ms">
                <path d="M1 10L10 1M10 1H3M10 1V8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <p id="requestMessage" class="status-message" aria-live="polite"></p>
          </form>
        </section>

        <!-- Contacts -->
        <footer class="foot" aria-label="Contacto">
          <a class="contact-link" href="mailto:contacto@enbrutostudio.com.ar" aria-label="Email">
            <svg viewBox="0 0 14 11" fill="none" aria-hidden="true">
              <rect x="0.5" y="0.5" width="13" height="10" rx="1" stroke="currentColor" stroke-width="1.1"/>
              <path d="M1 1.5L7 6.5L13 1.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
            </svg>
            Mail
          </a>
          <a class="contact-link" href="https://wa.me/5491173641852" target="_blank" rel="noopener" aria-label="WhatsApp">
            <svg viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <circle cx="7" cy="7" r="6.2" stroke="currentColor" stroke-width="1.1"/>
              <path d="M4.5 4.8C4.8 4.2 5.6 3.8 6.2 4.2L6.9 4.8C7.2 5.1 7.1 5.5 6.9 5.8L6.6 6.2C6.8 6.6 7.4 7.2 7.8 7.4L8.2 7.1C8.5 6.9 8.9 6.8 9.2 7.1L9.8 7.8C10.2 8.4 9.8 9.2 9.2 9.5C7.8 10.1 4.0 8.5 3.5 6.5C3.3 5.8 3.8 5.1 4.5 4.8Z" stroke="currentColor" stroke-width="0.9" stroke-linecap="round"/>
            </svg>
            WhatsApp
          </a>
          <a class="contact-link" href="https://instagram.com/enbruto.insta" target="_blank" rel="noopener" aria-label="Instagram">
            <svg viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <rect x="0.7" y="0.7" width="12.6" height="12.6" rx="3.2" stroke="currentColor" stroke-width="1.1"/>
              <circle cx="7" cy="7" r="2.6" stroke="currentColor" stroke-width="1.1"/>
              <circle cx="10.4" cy="3.6" r="0.6" fill="currentColor"/>
            </svg>
            Instagram
          </a>
        </footer>

      </div>

      <!-- RIGHT -->
      <div class="right-panel logo-panel" aria-hidden="true">
        <img src="assets/isologo.jpeg" alt="" class="hero-logo" />
      </div>

    </section>
  </main>

  <script src="app.js"></script>
  <script>
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const t = tab.dataset.view;
        document.querySelectorAll('.tab').forEach(x => { x.classList.remove('is-active'); x.setAttribute('aria-selected','false'); });
        document.querySelectorAll('.view').forEach(x => x.classList.remove('is-active'));
        tab.classList.add('is-active'); tab.setAttribute('aria-selected','true');
        document.querySelector(`[data-content="${t}"]`).classList.add('is-active');
      });
    });
  </script>
</body>
</html>
