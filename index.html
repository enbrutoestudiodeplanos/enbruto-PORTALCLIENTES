<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Portal privado</title>
  <meta name="description" content="Portal privado para clientes autorizados." />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="site-shell portal-shell">
    <section class="card split-card">
      <div class="left-panel">
        <p class="eyebrow">Acceso</p>
        <h1>Portal privado</h1>
        <p class="lead">Portal privado para clientes autorizados.</p>

        <form id="portalLoginForm" class="stack-form" novalidate>
          <label for="portalEmail">Correo electrónico</label>
          <input id="portalEmail" name="email" type="email" placeholder="contacto@estudio.com" autocomplete="email" required />
          <button class="primary-button ghost-button" type="submit">Acceder</button>
          <p id="portalLoginMessage" class="status-message" aria-live="polite"></p>
        </form>
      </div>
      <div class="right-panel logo-panel" aria-hidden="true">
        <img src="assets/isologo.jpeg" alt="" class="hero-logo" />
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
