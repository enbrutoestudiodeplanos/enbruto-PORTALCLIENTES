<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Portal privado</title>
  <meta name="description" content="Portal privado para clientes autorizados." />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="site-shell portal-shell">
    <section class="card split-card">

      <div class="left-panel">
        <p class="eyebrow">Acceso</p>
        <h1>Portal<br>privado</h1>
        <p class="lead">Portal privado para clientes autorizados.</p>

        <form id="portalLoginForm" class="stack-form" novalidate>
          <label for="portalEmail">Correo electrónico</label>
          <div class="field-wrap">
            <input id="portalEmail" name="email" type="email" placeholder="contacto@estudio.com" autocomplete="email" required />
          </div>
          <button class="primary-button" type="submit"><span>Acceder</span></button>
          <p id="portalLoginMessage" class="status-message" aria-live="polite"></p>
        </form>
      </div>

      <div class="right-panel logo-panel" aria-hidden="true">
        <img src="assets/LANDING.svg" class="topo-bg" alt="" />
        <div class="hero-stage">
          <div class="hero-stage__glow"></div>
          <div class="hero-stage__frame">
            <div class="hero-stage__top">
              <div class="spec-item">
                <span class="spec-item__label">ENTREGA</span>
                <strong>rápida</strong>
              </div>
              <div class="spec-item">
                <span class="spec-item__label">ARCHIVOS</span>
                <strong>ordenados</strong>
              </div>
              <div class="spec-item">
                <span class="spec-item__label">ATENCIÓN</span>
                <strong>directa</strong>
              </div>
            </div>
            <img src="assets/isologo.svg" alt="" class="hero-logo" />
            <div class="hero-stage__specs">
              <div class="spec-item">
                <span class="spec-item__label">ACCESO</span>
                <strong>privado</strong>
              </div>
              <div class="spec-item">
                <span class="spec-item__label">FLUJO</span>
                <strong>simple</strong>
              </div>
              <div class="spec-item">
                <span class="spec-item__label">SOPORTE</span>
                <strong>humano</strong>
              </div>
            </div>
          </div>
        </div>
      </div>

    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
